name: hungo
description: App học tiếng Anh đa kỹ năng
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  sqflite: ^2.3.0
  path: ^1.9.0
  http: ^1.2.0
  crypto: ^3.0.3
  flutter_tts: ^3.8.5
  cached_network_image: ^3.3.1
  lottie: ^2.7.0
  shared_preferences: ^2.2.2
  flutter_card_swiper: ^6.0.0
  fl_chart: ^0.66.2
  shimmer: ^3.0.0
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.2
  # Firebase
  firebase_core: any
  firebase_storage: ^11.6.0
  # Audio & File
  audioplayers: ^6.0.0
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/images/
